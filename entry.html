<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>恐竜レジ</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#111111">

  <style>
    :root{
      --barH: 170px;
      --pressScale: .96;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      -webkit-text-size-adjust:100%;
      touch-action:manipulation;
    }

    body{
      font-family:-apple-system, system-ui, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background:#fafafa;
      overscroll-behavior:contain;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }

    a.back{
      display:inline-block;
      margin:10px 12px 0;
      color:#1e88e5;
      text-decoration:none;
      font-weight:900;
    }

    h1{
      margin:0;
      padding:12px 14px 8px;
      font-size:18px;
    }

    #deviceLabel{
      padding:0 14px 8px;
      font-weight:900;
      font-size:18px;
      color:#111;
    }

    .app{
      height:100svh;
      display:flex;
      flex-direction:column;
    }

    .scroll{
      flex:1;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:0 12px calc(var(--barH) + 16px);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:4px;
    }

    .card{
      background:#fff;
      border:1px solid #ddd;
      border-radius:12px;
      padding:10px;
    }

    .name{
      font-size:14px;
      font-weight:900;
      text-align:center;
      margin-bottom:8px;
    }

    button{
      width:100%;
      border:0;
      border-radius:12px;
      font-weight:900;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      appearance:none;
      -webkit-appearance:none;
      transform:translateZ(0);
      transition:transform .06s ease, filter .12s ease, box-shadow .12s ease, opacity .12s ease;
      box-shadow:0 2px 6px rgba(0,0,0,.08);
    }

    button:active,
    button.pressed{
      transform:scale(var(--pressScale));
      filter:brightness(.88);
      box-shadow:0 1px 2px rgba(0,0,0,.14) inset;
    }

    button:disabled{
      opacity:.6;
      cursor:default;
    }

    .sale{
      background:#1e88e5;
      color:#fff;
      font-size:30px;
      padding:26px 10px;
      border-radius:16px;
      min-height:96px;
    }

    .refund{
      background:#e53935;
      color:#fff;
      font-size:16px;
      padding:12px 10px;
      margin-top:8px;
      min-height:52px;
    }

    .summary{
      margin-top:14px;
      background:#111;
      color:#fff;
      border-radius:14px;
      padding:14px;
    }

    .total{
      font-size:28px;
      font-weight:900;
      margin-top:4px;
    }

    .small{
      font-size:13px;
      opacity:.9;
      margin-top:6px;
    }

    .row{
      display:flex;
      gap:10px;
      margin-top:10px;
      flex-wrap:wrap;
    }

    .ghost{
      background:#f2f2f2;
      color:#111;
      padding:12px 10px;
      border-radius:12px;
      font-size:14px;
      font-weight:900;
      min-height:48px;
    }

    .bar{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:99999;
      background:#fff;
      border-top:1px solid #ddd;
      box-shadow:0 -6px 16px rgba(0,0,0,.15);
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
      height:var(--barH);
    }

    .barTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
    }

    .barTitle{
      font-size:14px;
      font-weight:900;
    }

    .barTotal{
      font-size:18px;
      font-weight:900;
    }

    .list{
      max-height:70px;
      overflow:auto;
      border-top:1px dashed #ddd;
      padding-top:6px;
      font-size:13px;
    }

    .lineItem{
      display:flex;
      justify-content:space-between;
      padding:4px 0;
    }

    .barBtns{
      display:flex;
      gap:10px;
      margin-top:8px;
    }

    .confirm{
      flex:1;
      background:#2e7d32;
      color:#fff;
      font-size:18px;
      padding:14px;
      border-radius:14px;
      min-height:54px;
    }

    .clear{
      width:34%;
      background:#616161;
      color:#fff;
      font-size:15px;
      padding:14px;
      border-radius:14px;
      min-height:54px;
    }

    .hint{
      font-size:12px;
      color:#666;
      margin-top:6px;
    }

    /* 押せた表示 */
    #tapToastWrap{
      position:fixed;
      left:0;
      right:0;
      top:12px;
      display:flex;
      justify-content:center;
      pointer-events:none;
      z-index:1000000;
      padding:0 12px;
    }

    .tapToast{
      background:rgba(17,17,17,.92);
      color:#fff;
      font-weight:900;
      font-size:15px;
      padding:10px 14px;
      border-radius:999px;
      box-shadow:0 8px 20px rgba(0,0,0,.2);
      transform:translateY(-8px) scale(.96);
      opacity:0;
      transition:opacity .16s ease, transform .16s ease;
      max-width:92vw;
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .tapToast.show{
      opacity:1;
      transform:translateY(0) scale(1);
    }

    /* ボタン内の小さな反応 */
    .pulseFlash{
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:rgba(255,255,255,.22);
      opacity:0;
      pointer-events:none;
    }

    .hasFlash{
      position:relative;
      overflow:hidden;
    }

    .hasFlash.flash .pulseFlash{
      animation:flashAnim .22s ease;
    }

    @keyframes flashAnim{
      0%{ opacity:.55; }
      100%{ opacity:0; }
    }
  </style>
</head>

<body>
<a class="back" href="./index.html">← メニューに戻る</a>

<div id="tapToastWrap"><div id="tapToast" class="tapToast"></div></div>

<div class="app">
  <h1>恐竜レジ</h1>
  <div id="deviceLabel">端末：—</div>

  <div class="scroll">
    <div class="grid" id="items"></div>

    <div class="summary">
      <div>売上合計</div>
      <div class="total" id="total">＊＊＊＊</div>
      <div class="small" id="counts">（非表示）</div>

      <div class="row">
        <button class="ghost" id="unlock">売上を見る</button>
        <button class="ghost" id="lock">隠す</button>
        <button class="ghost" id="adminBtn">管理者</button>
      </div>

      <div class="small" id="dayInfo"></div>
    </div>
  </div>

  <div class="bar">
    <div class="barTop">
      <div class="barTitle">確定前（まとめ）</div>
      <div class="barTotal" id="pTotal">—</div>
    </div>

    <div class="list" id="pList">未選択</div>

    <div class="barBtns">
      <button class="confirm" id="confirmBtn">確定</button>
      <button class="clear" id="clearBtn">クリア</button>
    </div>

    <div class="hint">※オンライン時はその場で送信／オフライン時は保存→復帰で自動送信</div>
  </div>
</div>

<div id="adminModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:999999;">
  <div style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
              width:min(720px,92vw); max-height:82vh; overflow:auto;
              background:#fff; border-radius:16px; padding:14px; box-shadow:0 10px 30px rgba(0,0,0,.25);">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
      <div style="font-weight:900; font-size:18px;">管理者メニュー（恐竜レジ）</div>
      <button id="adminClose" class="ghost" style="padding:10px 12px;">閉じる</button>
    </div>

    <div style="margin-top:10px; padding:10px; border:1px solid #eee; border-radius:12px;">
      <div style="font-weight:900; margin-bottom:6px;">端末名（この端末）</div>
      <input id="adminDevice" style="width:100%; padding:10px; font-size:16px; border-radius:10px; border:1px solid #ccc;" />
      <div style="font-size:12px; color:#666; margin-top:6px;">例：受付A / 受付B / ふわふわ</div>
    </div>

    <div style="margin-top:10px; padding:10px; border:1px solid #eee; border-radius:12px;">
      <div style="font-weight:900; margin-bottom:6px;">商品（名前・価格・返金）</div>
      <div style="font-size:12px; color:#666; margin-bottom:8px;">
        ※このページ（恐竜レジ）だけに保存されます
      </div>

      <div id="adminProducts"></div>

      <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
        <button id="adminAdd" class="ghost" style="padding:10px 12px;">＋ 商品を追加</button>
        <button id="adminReset" class="ghost" style="padding:10px 12px;">初期設定に戻す</button>
      </div>
    </div>

    <div style="display:flex; gap:10px; margin-top:12px;">
      <button id="adminSave" style="flex:1; background:#2e7d32; color:#fff; border:0; border-radius:14px; font-weight:900; font-size:16px; padding:14px;">保存</button>
      <button id="adminCancel" style="width:34%; background:#616161; color:#fff; border:0; border-radius:14px; font-weight:900; font-size:16px; padding:14px;">キャンセル</button>
    </div>
  </div>
</div>

<script>
(() => {
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(console.log);
  }

  const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwIATpKGHWwn33_nEH4asRggzpzQziSY70LjW8sdQ4I9AdUP54j3l_oBkhEqZHy-xQoXQ/exec";
  const ADMIN_PASSWORD = "4181";
  const PASSWORD = "7777";

  const DEVICE_KEY = "pos_device_name";
  const PRODUCTS_KEY = "pos_products_entry_v1";
  const QUEUE_KEY = "pos_queue_entry_v1";

  const DEFAULT_PRODUCTS = [
    { key:"entry", name:"入場料", price:500, refundable:true },
    { key:"goods", name:"グッズ", price:300, refundable:true },
    { key:"walk",  name:"お散歩ダイナソー", price:500, refundable:true }
  ];

  function deepClone(x){ return JSON.parse(JSON.stringify(x)); }

  function getDeviceName(){
    let name = localStorage.getItem(DEVICE_KEY);
    if(!name){
      name = prompt("このレジの名前を入力してください\n例：受付A / 受付B / ふわふわ");
      if(!name) name = "未設定";
      localStorage.setItem(DEVICE_KEY, name);
    }
    return name;
  }

  let DEVICE_NAME = getDeviceName();

  function loadProducts(){
    try{
      const raw = localStorage.getItem(PRODUCTS_KEY);
      if(!raw) return deepClone(DEFAULT_PRODUCTS);
      const arr = JSON.parse(raw);
      if(!Array.isArray(arr) || !arr.length) return deepClone(DEFAULT_PRODUCTS);
      return arr.map((p,i)=>({
        key: (p.key && String(p.key)) || `p${i+1}`,
        name: (p.name && String(p.name)) || "商品",
        price: Number(p.price) || 0,
        refundable: p.refundable !== false,
      }));
    }catch(e){
      return deepClone(DEFAULT_PRODUCTS);
    }
  }

  function saveProducts(arr){
    localStorage.setItem(PRODUCTS_KEY, JSON.stringify(arr));
  }

  let PRODUCTS = loadProducts();

  const loadQueue = () => {
    try{ return JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]"); }
    catch(e){ return []; }
  };

  const saveQueue = (q) => {
    try{ localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
    catch(e){}
  };

  const enqueueRows = (rows) => {
    if(!rows?.length) return;
    const q = loadQueue();
    q.push(...rows);
    saveQueue(q);
  };

  function flushQueue(){
    const q = loadQueue();
    if(!q.length) return;
    if(!navigator.onLine) return;

    fetch(GAS_WEBAPP_URL,{
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify(q)
    }).then(res=>{
      if(res.ok) saveQueue([]);
    }).catch(()=>{});
  }

  window.addEventListener("online", flushQueue);
  window.addEventListener("load", flushQueue);

  const itemsEl    = document.getElementById("items");
  const pTotalEl   = document.getElementById("pTotal");
  const pListEl    = document.getElementById("pList");
  const totalEl    = document.getElementById("total");
  const countsEl   = document.getElementById("counts");
  const dayInfoEl  = document.getElementById("dayInfo");
  const deviceLbl  = document.getElementById("deviceLabel");
  const confirmBtn = document.getElementById("confirmBtn");
  const clearBtn   = document.getElementById("clearBtn");
  const tapToastEl = document.getElementById("tapToast");

  let unlocked = false;
  let pending = {};
  let total = 0;
  let counts = {};
  let toastTimer = null;
  let confirmBusy = false;

  function resetCounts(){
    counts = {};
    PRODUCTS.forEach(p=>counts[p.key]=0);
  }
  resetCounts();

  function vibrate(ms=18){
    if(navigator.vibrate) navigator.vibrate(ms);
  }

  function showToast(text){
    tapToastEl.textContent = text;
    tapToastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>{
      tapToastEl.classList.remove("show");
    }, 520);
  }

  function pressFx(el){
    if(!el) return;
    el.classList.add("pressed");
    el.classList.add("flash");
    setTimeout(()=>el.classList.remove("pressed"), 90);
    setTimeout(()=>el.classList.remove("flash"), 220);
  }

  function attachButtonPressFeedback(root=document){
    const selector = "button";
    root.querySelectorAll(selector).forEach(btn=>{
      if(!btn.classList.contains("hasFlash")){
        btn.classList.add("hasFlash");
        const span = document.createElement("span");
        span.className = "pulseFlash";
        btn.appendChild(span);
      }
    });
  }

  function renderProducts(){
    itemsEl.innerHTML = "";
    PRODUCTS.forEach(p=>{
      const d = document.createElement("div");
      d.className = "card";
      d.innerHTML = `
        <div class="name">${escapeHtml(p.name)}</div>
        <button class="sale hasFlash" data-key="${escapeHtml(p.key)}" data-sign="1">¥${Number(p.price).toLocaleString()}<span class="pulseFlash"></span></button>
        ${p.refundable ? `<button class="refund hasFlash" data-key="${escapeHtml(p.key)}" data-sign="-1">返金<span class="pulseFlash"></span></button>` : ``}
      `;
      itemsEl.appendChild(d);
    });
    attachButtonPressFeedback(itemsEl);
  }

  itemsEl.addEventListener("pointerdown", (e)=>{
    const b = e.target.closest("button");
    if(!b) return;
    pressFx(b);
  });

  itemsEl.addEventListener("click", (e)=>{
    const b = e.target.closest("button");
    if(!b) return;

    const key = b.dataset.key;
    const sign = Number(b.dataset.sign || 0);
    const p = PRODUCTS.find(x=>x.key===key);
    if(!p || !sign) return;

    if(!pending[key]) pending[key] = { name:p.name, price:Number(p.price)||0, qty:0 };
    pending[key].qty += sign;

    if(pending[key].qty === 0) delete pending[key];

    vibrate(sign > 0 ? 15 : 22);
    showToast(sign > 0 ? `追加：${p.name}` : `返金：${p.name}`);
    renderPending();
  });

  confirmBtn.addEventListener("pointerdown", ()=> pressFx(confirmBtn));
  clearBtn.addEventListener("pointerdown", ()=> pressFx(clearBtn));

  confirmBtn.addEventListener("click", ()=>{
    if(confirmBusy) return;

    const keys = Object.keys(pending);
    if(!keys.length){
      showToast("商品を選んでください");
      vibrate(12);
      return;
    }

    confirmBusy = true;
    confirmBtn.disabled = true;
    confirmBtn.textContent = "送信中…";

    const nowTs = Date.now();
    const rows = [];

    keys.forEach(k=>{
      const it = pending[k];
      const sub = it.price * it.qty;

      total += sub;
      if(counts[k] == null) counts[k] = 0;
      counts[k] += it.qty;

      rows.push({
        ts: nowTs,
        device: DEVICE_NAME,
        key: k,
        name: it.name,
        unitPrice: it.price,
        qty: it.qty,
        subtotal: sub
      });
    });

    
    confirmBtn.addEventListener("click", ()=>{
  if(confirmBusy) return;

  const keys = Object.keys(pending);
  if(!keys.length){
    showToast("商品を選んでください");
    vibrate(12);
    return;
  }

  confirmBusy = true;
  confirmBtn.disabled = true;
  confirmBtn.textContent = "送信中…";

  const nowTs = Date.now();
  const rows = [];

  keys.forEach(k=>{
    const it = pending[k];
    const sub = it.price * it.qty;

    total += sub;
    if(counts[k] == null) counts[k] = 0;
    counts[k] += it.qty;

    rows.push({
      ts: nowTs,
      device: DEVICE_NAME,
      key: k,
      name: it.name,
      unitPrice: it.price,
      qty: it.qty,
      subtotal: sub
    });
  });

  // 通信は裏で送る
  if(navigator.onLine){
    fetch(GAS_WEBAPP_URL,{
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify(rows)
    }).catch(()=>{
      enqueueRows(rows);
    });
  }else{
    enqueueRows(rows);
  }

  // 画面はすぐ戻す
  pending = {};
  render();
  renderPending();
  showToast("確定しました");
  vibrate(25);

  confirmBusy = false;
  confirmBtn.disabled = false;
  confirmBtn.textContent = "確定";
});

  clearBtn.addEventListener("click", ()=>{
    pending = {};
    renderPending();
    showToast("クリアしました");
    vibrate(14);
  });

  document.getElementById("unlock").addEventListener("click", (e)=>{
    pressFx(e.currentTarget);
    const pw = prompt("パスワード");
    if(pw === PASSWORD){
      unlocked = true;
      render();
      showToast("売上を表示しました");
    }else if(pw !== null){
      alert("パスワードが違います");
    }
  });

  document.getElementById("lock").addEventListener("click", (e)=>{
    pressFx(e.currentTarget);
    unlocked = false;
    render();
    showToast("売上を隠しました");
  });

  function render(){
    deviceLbl.textContent = "端末： " + DEVICE_NAME;

    if(unlocked){
      totalEl.textContent = `¥${total.toLocaleString()}`;
      countsEl.textContent = PRODUCTS.map(p=>`${p.name}:${counts[p.key]||0}回`).join(" / ");
    }else{
      totalEl.textContent = "＊＊＊＊";
      countsEl.textContent = "（非表示）";
    }

    const ds = new Date().toLocaleDateString("ja-JP");
    dayInfoEl.textContent = `日付:${ds} / 端末:${DEVICE_NAME} / ${navigator.onLine ? "オンライン" : "オフライン"}`;
  }

  function renderPending(){
    const items = Object.values(pending);
    if(!items.length){
      pTotalEl.textContent = "—";
      pListEl.innerHTML = "未選択";
      return;
    }

    let q = 0;
    let y = 0;
    items.forEach(it=>{
      q += Math.abs(it.qty);
      y += it.price * it.qty;
    });

    const sign = (y < 0) ? "-" : "";
    pTotalEl.textContent = `${q}点 合計 ${sign}¥${Math.abs(y).toLocaleString()}`;

    const shown = items.slice(0,3);
    pListEl.innerHTML =
      shown.map(it=>{
        const sub = it.price * it.qty;
        const sgn = (sub < 0) ? "-" : "";
        return `<div class="lineItem"><div>${escapeHtml(it.name)}×${it.qty}</div><div>${sgn}¥${Math.abs(sub).toLocaleString()}</div></div>`;
      }).join("") +
      (items.length > 3 ? `<div class="lineItem">…他${items.length-3}件</div>` : "");
  }

  const adminBtn = document.getElementById("adminBtn");
  const adminModal = document.getElementById("adminModal");
  const adminClose = document.getElementById("adminClose");
  const adminCancel = document.getElementById("adminCancel");
  const adminSave = document.getElementById("adminSave");
  const adminAdd = document.getElementById("adminAdd");
  const adminReset = document.getElementById("adminReset");
  const adminDevice = document.getElementById("adminDevice");
  const adminProducts = document.getElementById("adminProducts");

  let adminDraft = null;

  function openAdmin(){
    const pw = prompt("管理者パスワード");
    if(pw !== ADMIN_PASSWORD) return alert("パスワードが違います");

    adminDraft = {
      device: DEVICE_NAME,
      products: PRODUCTS.map(p=>({...p}))
    };

    adminDevice.value = adminDraft.device;
    renderAdminProducts();
    adminModal.style.display = "block";
    showToast("管理者メニューを開きました");
  }

  function closeAdmin(){
    adminModal.style.display = "none";
    adminDraft = null;
  }

  function renderAdminProducts(){
    adminProducts.innerHTML = "";
    adminDraft.products.forEach((p, idx)=>{
      const row = document.createElement("div");
      row.style.cssText = "display:grid; grid-template-columns:1.6fr 1fr .9fr .6fr; gap:8px; align-items:center; margin-top:8px;";
      row.innerHTML = `
        <input data-f="name" data-i="${idx}" value="${escapeAttr(p.name)}"
          style="width:100%; padding:10px; font-size:16px; border-radius:10px; border:1px solid #ccc;" />
        <input data-f="price" data-i="${idx}" value="${Number(p.price)||0}" inputmode="numeric"
          style="width:100%; padding:10px; font-size:16px; border-radius:10px; border:1px solid #ccc;" />
        <label style="display:flex; gap:6px; align-items:center; font-size:13px;">
          <input type="checkbox" data-f="refundable" data-i="${idx}" ${p.refundable ? "checked" : ""}/>返金
        </label>
        <button data-del="${idx}" class="ghost hasFlash" style="padding:10px 8px;">削除<span class="pulseFlash"></span></button>
      `;
      adminProducts.appendChild(row);
    });
    attachButtonPressFeedback(adminProducts);
  }

  adminProducts.addEventListener("input", (e)=>{
    const t = e.target;
    const i = Number(t.dataset.i);
    if(!adminDraft || !Number.isFinite(i)) return;
    if(t.dataset.f === "name") adminDraft.products[i].name = t.value;
    if(t.dataset.f === "price") adminDraft.products[i].price = Number(t.value || 0);
  });

  adminProducts.addEventListener("change", (e)=>{
    const t = e.target;
    const i = Number(t.dataset.i);
    if(!adminDraft || !Number.isFinite(i)) return;
    if(t.dataset.f === "refundable") adminDraft.products[i].refundable = !!t.checked;
  });

  adminProducts.addEventListener("pointerdown", (e)=>{
    const b = e.target.closest("button");
    if(!b) return;
    pressFx(b);
  });

  adminProducts.addEventListener("click", (e)=>{
    const btn = e.target.closest("button");
    if(!btn) return;
    const di = btn.dataset.del;
    if(di == null) return;
    adminDraft.products.splice(Number(di), 1);
    renderAdminProducts();
  });

  adminAdd.onclick = ()=>{
    pressFx(adminAdd);
    adminDraft.products.push({ key:`p${Date.now()}`, name:"新商品", price:0, refundable:true });
    renderAdminProducts();
    showToast("商品を追加しました");
  };

  adminReset.onclick = ()=>{
    pressFx(adminReset);
    if(!confirm("恐竜レジを初期設定に戻しますか？")) return;
    adminDraft.products = deepClone(DEFAULT_PRODUCTS);
    renderAdminProducts();
    showToast("初期設定に戻しました");
  };

  adminSave.onclick = ()=>{
    pressFx(adminSave);

    const newDevice = adminDevice.value.trim() || "未設定";
    localStorage.setItem(DEVICE_KEY, newDevice);
    DEVICE_NAME = newDevice;

    PRODUCTS = adminDraft.products.map((p,i)=>({
      key: (p.key && String(p.key)) || `p${i+1}`,
      name: (p.name && String(p.name).trim()) || "商品",
      price: Number(p.price) || 0,
      refundable: p.refundable !== false,
    }));

    saveProducts(PRODUCTS);

    pending = {};
    resetCounts();
    renderProducts();
    render();
    renderPending();

    closeAdmin();
    alert("保存しました（恐竜レジ）");
  };

  adminBtn.onclick = (e)=>{ pressFx(e.currentTarget); openAdmin(); };
  adminClose.onclick = (e)=>{ pressFx(e.currentTarget); closeAdmin(); };
  adminCancel.onclick = (e)=>{ pressFx(e.currentTarget); closeAdmin(); };

  function escapeHtml(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function escapeAttr(s){
    return escapeHtml(s);
  }

  attachButtonPressFeedback(document);
  renderProducts();
  render();
  renderPending();
})();
</script>
</body>
</html>
